<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#87CEEB">
  <title>Volleyball!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="vb-page">

  <div id="vb-sky"></div>
  <div id="vb-sand"></div>
  <div id="vb-sun"></div>
  <div id="vb-cloud"></div>

  <div id="vb-net">
    <div id="vb-net-pole-top"></div>
    <div id="vb-net-body"></div>
    <div id="vb-net-pole-bot"></div>
  </div>

  <!-- ZANE (left) -->
  <div id="vb-zane" class="vb-player">
    <div class="vb-head">
      <div class="vb-hair zane-hair"></div>
      <div class="vb-eye vb-eye-l"></div>
      <div class="vb-eye vb-eye-r"></div>
      <div class="vb-smile"></div>
    </div>
    <div class="vb-body"></div>
    <div class="vb-arm vb-arm-l"></div>
    <div class="vb-arm vb-arm-r"></div>
    <div class="vb-leg vb-leg-l"></div>
    <div class="vb-leg vb-leg-r"></div>
  </div>

  <button id="vb-quit">✕ Quit</button>
  <div id="vb-tap-left"></div>
  <div id="vb-fireworks"></div>
  <div id="vb-celebration"><div id="vb-celeb-text"></div><div id="vb-celeb-sub"></div></div>
  <div id="vb-countdown"></div>

</div>

<script src="js/game.js"></script>

</body>
</html>
