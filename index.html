<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bloop's World">
  <meta name="theme-color" content="#87CEEB">
  <link rel="manifest" href="manifest.json">
  <title>Bloop's World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/minigames/dancegrid.css">
  <style>
    /* ── MENU ───────────────────────────────────────── */
    #menu-btn {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 200;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(0,0,0,0.28);
      border: 2px solid rgba(255,255,255,0.5);
      color: white;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    #menu-btn:active { background: rgba(0,0,0,0.5); }

    #menu-dropdown {
      position: fixed;
      top: 66px;
      left: 14px;
      z-index: 200;
      background: rgba(20,20,40,0.92);
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      padding: 8px;
      display: none;
      flex-direction: column;
      gap: 6px;
      min-width: 180px;
      backdrop-filter: blur(8px);
    }
    #menu-dropdown.open { display: flex; }

    .menu-item {
      font-family: 'Fredoka One', cursive;
      font-size: 16px;
      color: white;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 16px;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.15s;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
    }
    .menu-item:active { background: rgba(255,255,255,0.22); }
  </style>
</head>
<body>

<div id="game">

  <div id="sky-zone"></div>
  <div id="sun"></div>
  <div id="cloud1" class="cloud"></div>
  <div id="cloud2" class="cloud"></div>
  <div id="rainbow"></div>

  <!-- BLOOP -->
  <div id="bloop-wrap">
    <div id="bloop">
      <div id="bloop-body"></div>
      <div class="bloop-cheek" id="cheek-l"></div>
      <div class="bloop-cheek" id="cheek-r"></div>
      <div class="bloop-eye" id="eye-l">
        <div class="pupil" id="pupil-l"></div>
      </div>
      <div class="bloop-eye" id="eye-r">
        <div class="pupil" id="pupil-r"></div>
      </div>
      <div id="bloop-mouth"></div>
      <div id="bloop-belly"></div>
      <div class="bloop-arm" id="arm-l"></div>
      <div class="bloop-arm" id="arm-r"></div>
    </div>
  </div>

  <div id="ground-zone"></div>
  <div id="ground"></div>
  <div id="chomps"></div>

  <div id="combo-dots"></div>
  <div id="combo-flash"></div>
  <div id="celebration"></div>

</div>

<!-- MENU BUTTON -->
<button id="menu-btn" aria-label="Menu">☰</button>

<!-- DROPDOWN -->
<div id="menu-dropdown">
  <button class="menu-item" id="menu-dancegrid">🎮 Dance Grid</button>
  <!-- Future mini games slot in here -->
</div>

<script src="js/audio.js"></script>
<script src="js/monsters.js"></script>
<script src="js/combos.js"></script>
<script src="js/minigames/dancegrid.js"></script>
<script src="js/game.js"></script>

<script>
  const menuBtn  = document.getElementById('menu-btn');
  const menuDrop = document.getElementById('menu-dropdown');

  // Toggle menu open/close
  menuBtn.addEventListener('click', e => {
    e.stopPropagation();
    menuDrop.classList.toggle('open');
  });

  // Close menu if tapping outside
  document.addEventListener('click', () => menuDrop.classList.remove('open'));
  document.addEventListener('touchend', () => menuDrop.classList.remove('open'), { passive: true });

  // Dance Grid
  document.getElementById('menu-dancegrid').addEventListener('click', e => {
    e.stopPropagation();
    menuDrop.classList.remove('open');
    DanceGrid.launch(() => {
      animateBloop('happy');
      spawnBurstEffects();
    });
  });
</script>

</body>
</html>
